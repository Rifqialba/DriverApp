pluginManagement { 
    includeBuild("../node_modules/@react-native/gradle-plugin") 
}

plugins { 
    id("com.facebook.react.settings") 
}

extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> 
    ex.autolinkLibrariesFromCommand() 
}

rootProject.name = 'DriverApp'
include ':app'

includeBuild('../node_modules/@react-native/gradle-plugin')

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT) // 🔥 GANTI INI
    repositories {
        google()
        mavenCentral()
        maven { url("$rootDir/../node_modules/react-native/android") } // penting RN
        maven { url("$rootDir/../node_modules/jsc-android/dist") } // optional
    }
}